<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment | Patil Eye Care</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f9fafb 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 0;
      }
      h3 {
          font-family: 'Outfit', sans-serif;
      }
      .appointment-card {
          background: rgba(255, 255, 255, 0.95);
          border: 1px solid rgba(16, 185, 129, 0.15);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
      }
      .form-label {
          font-weight: 600;
          color: #064e3b;
          font-size: 0.9rem;
          margin-bottom: 6px;
      }
      .glass-input, .glass-select {
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 12px;
          padding: 12px 16px;
          font-size: 0.95rem;
          background: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          color: #064e3b;
          font-weight: 500;
      }
      .glass-input:focus, .glass-select:focus {
          background: #ffffff;
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 12px 28px;
          font-weight: 600;
          font-size: 0.95rem;
          box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
          transition: all 0.3s ease;
      }
      .btn-action:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
      }
      .info-badge {
          background: rgba(16, 185, 129, 0.1);
          color: #047857;
          padding: 6px 12px;
          border-radius: 20px;
          font-size: 0.8rem;
          font-weight: 600;
          display: inline-block;
          margin-bottom: 15px;
          border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .back-link {
          font-size: 0.9rem;
          font-weight: 600;
          color: #10b981;
          text-decoration: none;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
      
      /* Clickable Slot Styling */
      .btn-slot {
          background: rgba(255, 255, 255, 0.8);
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 10px;
          padding: 8px 12px;
          font-size: 0.82rem;
          font-weight: 600;
          color: #064e3b;
          transition: all 0.2s ease;
          flex: 1 1 calc(25% - 8px);
          min-width: 90px;
          text-align: center;
      }
      .btn-slot:hover {
          background: rgba(16, 185, 129, 0.1);
          border-color: #10b981;
          color: #047857;
      }
      .btn-slot.active {
          background: #10b981 !important;
          border-color: #10b981 !important;
          color: #ffffff !important;
          box-shadow: 0 4px 10px rgba(16, 185, 129, 0.25);
      }
      
      /* Disabled Booked Slot Styling */
      .btn-slot:disabled, .btn-slot[disabled] {
          background: #f3f4f6 !important;
          border-color: #e5e7eb !important;
          color: #9ca3af !important;
          cursor: not-allowed !important;
          text-decoration: line-through;
          box-shadow: none !important;
          opacity: 0.65;
      }
  </style>
  <script>
    function selectSlot(btn, timeString) {
      if (btn.disabled) {
        alert("This slot is already booked and not available!");
        return;
      }
      // Remove active class from all slots
      document.querySelectorAll('.btn-slot').forEach(function(el) {
        el.classList.remove('active');
      });
      // Add active class to clicked slot
      btn.classList.add('active');
      // Set value in hidden input
      document.getElementById('selected_time_slot').value = timeString;
    }

    async function checkSlotAvailability() {
      const doctor = document.getElementById('doctor').value;
      const date = document.getElementById('date').value;
      const slotInput = document.getElementById('selected_time_slot');
      
      // If either doctor or date is not selected, do nothing
      if (!doctor || !date) {
        return;
      }

      try {
        const response = await fetch(`/api/check-slots?doctor=${encodeURIComponent(doctor)}&date=${encodeURIComponent(date)}`);
        const bookedSlots = await response.json();

        // Loop through all slot buttons and disable booked ones
        document.querySelectorAll('.btn-slot').forEach(function(btn) {
          const slotVal = btn.getAttribute('data-slot-value');
          if (bookedSlots.includes(slotVal)) {
            btn.disabled = true;
            btn.classList.remove('active');
            // If the currently selected slot just got disabled, clear selection
            if (slotInput.value === slotVal) {
              slotInput.value = '';
            }
          } else {
            btn.disabled = false;
          }
        });
      } catch (error) {
        console.error("Error checking slot availability:", error);
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      // Bind check event listeners
      document.getElementById('doctor').addEventListener('change', checkSlotAvailability);
      document.getElementById('date').addEventListener('change', checkSlotAvailability);
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="appointment-card shadow-sm">
          <h3 class="text-center mb-2 fw-bold text-dark">Schedule Appointment</h3>
          <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Fill in your appointment preferences below.</p>
          
          <div class="text-center mb-4">
            <span class="info-badge">Patient Aadhaar: {{ aadhaar }}</span>
          </div>

          <form method="POST" action="/book-appointment/details">
            <input type="hidden" name="aadhaar" value="{{ aadhaar }}">
            <input type="hidden" name="department" value="Ophthalmology">
            <input type="hidden" name="amount" value="400.00">
            <input type="hidden" name="payment_method" value="Cash">
            <input type="hidden" name="time_slot" id="selected_time_slot" required>

            <!-- Doctor Dropdown Selection -->
            <div class="mb-3">
              <label for="doctor" class="form-label">Consulting Specialist Doctor</label>
              <select class="form-select glass-select" id="doctor" name="doctor" required>
                <option value="" disabled selected>Choose Doctor</option>
                <option value="Dr. Prajakta Chachre">Dr. Prajakta Chachre</option>
                <option value="Dr. XYZ">Dr. XYZ</option>
              </select>
            </div>

            <!-- Date Selection -->
            <div class="mb-4">
              <label class="form-label">Appointment Date</label>
              <input type="date" id="date" name="date" class="form-control glass-input" required min="{{ min_date }}">
            </div>

            <!-- Clickable Slots Grid (Morning) -->
            <div class="mb-3">
              <label class="form-label d-block mb-2" style="font-size: 0.85rem; color: #047857; letter-spacing: 0.5px; text-transform: uppercase;">Morning Slots (10:00 AM - 02:00 PM)</label>
              <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-slot" data-slot-value="10:00 AM - 10:30 AM" onclick="selectSlot(this, '10:00 AM - 10:30 AM')">10:00 AM</button>
                <button type="button" class="btn btn-slot" data-slot-value="10:30 AM - 11:00 AM" onclick="selectSlot(this, '10:30 AM - 11:00 AM')">10:30 AM</button>
                <button type="button" class="btn btn-slot" data-slot-value="11:00 AM - 11:30 AM" onclick="selectSlot(this, '11:00 AM - 11:30 AM')">11:00 AM</button>
                <button type="button" class="btn btn-slot" data-slot-value="11:30 AM - 12:00 PM" onclick="selectSlot(this, '11:30 AM - 12:00 PM')">11:30 AM</button>
                <button type="button" class="btn btn-slot" data-slot-value="12:00 PM - 12:30 PM" onclick="selectSlot(this, '12:00 PM - 12:30 PM')">12:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="12:30 PM - 01:00 PM" onclick="selectSlot(this, '12:30 PM - 01:00 PM')">12:30 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="01:00 PM - 01:30 PM" onclick="selectSlot(this, '01:00 PM - 01:30 PM')">01:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="01:30 PM - 02:00 PM" onclick="selectSlot(this, '01:30 PM - 02:00 PM')">01:30 PM</button>
              </div>
            </div>

            <!-- Clickable Slots Grid (Evening) -->
            <div class="mb-4">
              <label class="form-label d-block mb-2" style="font-size: 0.85rem; color: #047857; letter-spacing: 0.5px; text-transform: uppercase;">Evening Slots (06:00 PM - 10:00 PM)</label>
              <div class="d-flex flex-wrap gap-2">
                <button type="button" class="btn btn-slot" data-slot-value="06:00 PM - 06:30 PM" onclick="selectSlot(this, '06:00 PM - 06:30 PM')">06:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="06:30 PM - 07:00 PM" onclick="selectSlot(this, '06:30 PM - 07:00 PM')">06:30 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="07:00 PM - 07:30 PM" onclick="selectSlot(this, '07:00 PM - 07:30 PM')">07:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="07:30 PM - 08:00 PM" onclick="selectSlot(this, '07:30 PM - 08:00 PM')">08:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="08:00 PM - 08:30 PM" onclick="selectSlot(this, '08:00 PM - 08:30 PM')">08:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="08:30 PM - 09:00 PM" onclick="selectSlot(this, '08:30 PM - 09:00 PM')">08:30 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="09:00 PM - 09:30 PM" onclick="selectSlot(this, '09:00 PM - 09:30 PM')">09:00 PM</button>
                <button type="button" class="btn btn-slot" data-slot-value="09:30 PM - 10:00 PM" onclick="selectSlot(this, '09:30 PM - 10:00 PM')">09:30 PM</button>
              </div>
            </div>

            <button type="submit" class="btn btn-action btn-success w-100 mb-3">Book Appointment Slot ➔</button>
            <div class="text-center">
              <a href="/book-appointment" class="back-link">← Cancel and Go Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
