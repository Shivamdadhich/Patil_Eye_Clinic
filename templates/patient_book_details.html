<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Appointment | Patil Eye Care</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ffffff 50%, #f9fafb 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 0;
      }
      h3 {
          font-family: 'Outfit', sans-serif;
      }
      .appointment-card {
          background: rgba(255, 255, 255, 0.9);
          border: 1px solid rgba(16, 185, 129, 0.15);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
      }
      .form-label {
          font-weight: 600;
          color: #064e3b;
          font-size: 0.9rem;
          margin-bottom: 6px;
      }
      .glass-input, .glass-select {
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 12px;
          padding: 12px 16px;
          font-size: 0.95rem;
          background: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          color: #064e3b;
          font-weight: 500;
      }
      .glass-input:focus, .glass-select:focus {
          background: #ffffff;
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 12px 28px;
          font-weight: 600;
          font-size: 0.95rem;
          box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
          transition: all 0.3s ease;
      }
      .btn-action:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
      }
      .info-badge {
          background: rgba(16, 185, 129, 0.1);
          color: #047857;
          padding: 6px 12px;
          border-radius: 20px;
          font-size: 0.8rem;
          font-weight: 600;
          display: inline-block;
          margin-bottom: 15px;
          border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .back-link {
          font-size: 0.9rem;
          font-weight: 600;
          color: #10b981;
          text-decoration: none;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
  </style>
  <script>
    // Dynamic doctors grouped by department
    const doctorsByDept = {{ doctors_by_dept | tojson }};

    function updateDoctors() {
      const deptSelect = document.getElementById("department");
      const doctorSelect = document.getElementById("doctor");
      const selectedDept = deptSelect.value;

      // Clear current doctor options
      doctorSelect.innerHTML = "";

      // Add default choose option
      const defaultOpt = document.createElement("option");
      defaultOpt.value = "";
      defaultOpt.text = "Choose Doctor";
      defaultOpt.disabled = true;
      defaultOpt.selected = true;
      doctorSelect.appendChild(defaultOpt);

      if (selectedDept && doctorsByDept[selectedDept]) {
        doctorsByDept[selectedDept].forEach(function(docName) {
          const opt = document.createElement("option");
          opt.value = docName;
          opt.text = docName;
          doctorSelect.appendChild(opt);
        });
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="appointment-card shadow-sm">
          <h3 class="text-center mb-2 fw-bold text-dark">Schedule Appointment</h3>
          <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Fill in your appointment preferences below.</p>
          
          <div class="text-center mb-4">
            <span class="info-badge">Patient Aadhaar: {{ aadhaar }}</span>
          </div>

          <form method="POST" action="/book-appointment/details">
            <input type="hidden" name="aadhaar" value="{{ aadhaar }}">
            <input type="hidden" name="amount" value="500.00">
            <input type="hidden" name="payment_method" value="Cash">

            <div class="mb-3">
              <label for="department" class="form-label">Specialization / Department</label>
              <select class="form-select glass-select" id="department" name="department" required onchange="updateDoctors()">
                <option value="" disabled selected>Choose Specialty</option>
                {% for dept in doctors_by_dept.keys() %}
                  <option value="{{ dept }}">{{ dept }}</option>
                {% endfor %}
              </select>
            </div>

            <div class="mb-3">
              <label for="doctor" class="form-label">Consulting Specialist Doctor</label>
              <select class="form-select glass-select" id="doctor" name="doctor" required>
                <option value="" disabled selected>Choose Doctor</option>
              </select>
            </div>

            <div class="mb-4">
              <label class="form-label">Appointment Date</label>
              <input type="date" name="date" class="form-control glass-input" required min="{{ min_date }}">
            </div>

            <button type="submit" class="btn btn-action btn-success w-100 mb-3">Book Appointment Slot ➔</button>
            <div class="text-center">
              <a href="/book-appointment" class="back-link">← Cancel and Go Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
