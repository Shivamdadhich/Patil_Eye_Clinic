<!-- templates/other_login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login | Patil Eye Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }
        .login-card {
            background: #ffffff;
            border: 1px solid #d1fae5;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(4, 120, 87, 0.08);
            padding: 40px;
            width: 100%;
            max-width: 440px;
        }
        .login-title {
            font-weight: 700;
            color: #064e3b;
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            color: #047857;
            text-align: center;
            font-size: 0.95rem;
            margin-bottom: 30px;
        }
        .form-control {
            border-radius: 12px;
            border: 1.5px solid rgba(16, 185, 129, 0.2);
            padding: 12px 16px;
        }
        .form-control:focus {
            border-color: #10b981;
            box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.15);
        }
        .btn-submit {
            background: #10b981;
            border: none;
            color: white;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-submit:hover {
            background: #059669;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-3">
            <i id="roleIcon" class="bi bi-gear-fill text-success" style="font-size: 2.5rem;"></i>
        </div>
        <h3 class="login-title" id="loginTitle">Staff Login</h3>
        <p class="login-subtitle">Enter your credentials to access your division</p>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-danger alert-dismissible fade show py-2 px-3 small border-0 mb-3 text-center" role="alert" style="border-radius: 10px;">
                        {{ message }}
                        <button type="button" class="btn-close py-2" data-bs-dismiss="alert" aria-label="Close" style="padding: 10px;"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}
 
        <form method="POST">
            <div class="mb-3">
                <label class="form-label fw-semibold text-success small">Username</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold text-success small">Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn btn-submit w-100 mb-3">Sign In</button>
            <div class="text-center">
                <a href="/admin/login" class="text-success small fw-semibold text-decoration-none">&larr; Back to Gateways</a>
            </div>
        </form>
    </div>
 
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
 
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParams = new URLSearchParams(window.location.search);
            const role = urlParams.get('role');
            
            const titleElem = document.getElementById("loginTitle");
            const iconElem = document.getElementById("roleIcon");
            
            iconElem.className = "bi text-success";
            
            if (role === "accounts_office") {
                titleElem.innerText = "Accounts Office Login";
                iconElem.classList.add("bi-cash-stack");
                document.title = "Accounts Office Login | Patil Eye Clinic";
            } else if (role === "room_manager") {
                titleElem.innerText = "Room Manager Login";
                iconElem.classList.add("bi-door-open-fill");
                document.title = "Room Manager Login | Patil Eye Clinic";
            } else if (role === "pharmacy") {
                titleElem.innerText = "Pharmacy Login";
                iconElem.classList.add("bi-capsule-pill");
                document.title = "Pharmacy Login | Patil Eye Clinic";
            } else if (role === "admin") {
                titleElem.innerText = "System Admin Login";
                iconElem.classList.add("bi-shield-lock-fill");
                document.title = "System Admin Login | Patil Eye Clinic";
            } else {
                iconElem.classList.add("bi-gear-fill");
            }
        });
    </script>
</body>
</html>
