<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receptionist Login | Patil Eye Clinic</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    {% include 'theme_style.html' %}
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h3, .navbar-brand {
            font-family: 'Outfit', sans-serif;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.15);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
            transition: all 0.3s ease;
        }
        .login-card:hover {
            border-color: rgba(16, 185, 129, 0.35);
            box-shadow: 0 15px 35px -10px rgba(4, 120, 87, 0.12);
        }
        .logo-box {
            width: 54px;
            height: 54px;
            border-radius: 14px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1) 0%, rgba(52, 211, 153, 0.05) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #10b981;
            margin: 0 auto 20px auto;
            border: 1px solid rgba(16, 185, 129, 0.1);
        }
        .form-label {
            font-weight: 600;
            color: #064e3b;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }
        .glass-input {
            border: 1.5px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 0.95rem;
            background: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
            color: #064e3b;
            font-weight: 500;
        }
        .glass-input:focus {
            background: #ffffff;
            border-color: #10b981 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
        }
        .btn-action {
            border-radius: 12px;
            padding: 12px 28px;
            font-weight: 600;
            font-size: 0.95rem;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
            transition: all 0.3s ease;
        }
        .btn-action:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
        }
        .back-link {
            font-size: 0.9rem;
            font-weight: 600;
            color: #10b981;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .back-link:hover {
            color: #059669;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="login-card">
                    <div class="logo-box">✚</div>
                    <h3 class="text-center mb-4 fw-bold text-dark">Receptionist Login</h3>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            {% for category, message in messages %}
                                <div class="alert alert-{{ category }} text-center py-2" role="alert">
                                    {{ message }}
                                </div>
                            {% endfor %}
                        {% endif %}
                    {% endwith %}

                    <form method="POST" action="/receptionist/login">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control glass-input" required placeholder="Enter Username">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control glass-input" required placeholder="Enter Password">
                        </div>
                        <button type="submit" class="btn btn-action btn-primary w-100 mb-3">Login to Dashboard</button>
                        <div class="text-center d-flex justify-content-between align-items-center mt-2">
                            <a href="/admin/login" class="back-link">← Back to Selection</a>
                            <a href="/forgot-password" class="back-link" style="color: #4b5563; font-size: 0.85rem; font-weight: 500;">Forgot Password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
