<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password | Patil Eye Clinic</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
  
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 0;
      }
      h3 {
          font-family: 'Outfit', sans-serif;
      }
      .forgot-card {
          background: rgba(255, 255, 255, 0.95);
          border: 1px solid rgba(16, 185, 129, 0.15);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
      }
      .form-label {
          font-weight: 600;
          color: #064e3b;
          font-size: 0.9rem;
          margin-bottom: 6px;
      }
      .glass-input, .glass-select {
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 12px;
          padding: 12px 16px;
          font-size: 0.95rem;
          background: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          color: #064e3b;
          font-weight: 500;
      }
      .glass-input:focus, .glass-select:focus {
          background: #ffffff;
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 12px 28px;
          font-weight: 600;
          font-size: 0.95rem;
          box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
          transition: all 0.3s ease;
      }
      .btn-action:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
      }
      .back-link {
          font-size: 0.9rem;
          font-weight: 600;
          color: #10b981;
          text-decoration: none;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
  </style>
  <script>
    // Initialize Firebase (will fallback to mock mode if not configured)
    const firebaseConfig = {
      apiKey: "{{ firebase_api_key }}",
      authDomain: "{{ firebase_auth_domain }}",
      projectId: "{{ firebase_project_id }}",
      storageBucket: "{{ firebase_storage_bucket }}",
      messagingSenderId: "{{ firebase_messaging_sender_id }}",
      appId: "{{ firebase_app_id }}"
    };
    
    let isFirebaseConfigured = false;
    if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "None" && firebaseConfig.apiKey !== "") {
      try {
        firebase.initializeApp(firebaseConfig);
        isFirebaseConfigured = true;
      } catch (e) {
        console.warn("Firebase initialization failed, falling back to mock developer mode:", e);
      }
    }

    let confirmationResultObj = null;
    let mockOTPCode = "";

    document.addEventListener("DOMContentLoaded", function() {
      if (isFirebaseConfigured) {
        window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', {
          'size': 'invisible'
        });
      }
    });

    async function sendOTP() {
      const role = document.getElementById('role').value;
      const username = document.getElementById('username').value;
      const statusMsg = document.getElementById('status-message');

      if (!role || !username) {
        statusMsg.className = "alert alert-warning";
        statusMsg.textContent = "Please fill in all details first.";
        statusMsg.style.display = "block";
        return;
      }

      statusMsg.className = "alert alert-info";
      statusMsg.textContent = "Verifying credentials...";
      statusMsg.style.display = "block";

      try {
        // Step 1: Verify staff exists in DB
        const response = await fetch('/api/verify-staff', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({role, username})
        });
        const verification = await response.json();

        if (!verification.success) {
          statusMsg.className = "alert alert-danger";
          statusMsg.textContent = verification.message;
          return;
        }

        const contact = verification.contact;
        const maskedContact = verification.masked_contact;
        
        // Save contact in hidden field
        document.getElementById('hidden-contact').value = contact;

        // Step 2: Trigger OTP
        if (isFirebaseConfigured) {
          statusMsg.textContent = "Triggering Google Firebase OTP...";
          const phoneNumber = "+91" + contact; // Standard Indian code prefix
          const appVerifier = window.recaptchaVerifier;
          
          firebase.auth().signInWithPhoneNumber(phoneNumber, appVerifier)
            .then(function(confirmationResult) {
              confirmationResultObj = confirmationResult;
              statusMsg.className = "alert alert-success";
              statusMsg.textContent = "We have sent a verification OTP on your registered number " + maskedContact;
              document.getElementById('otp-section').style.display = "block";
              document.getElementById('details-section').style.opacity = "0.6";
            }).catch(function(error) {
              statusMsg.className = "alert alert-danger";
              statusMsg.textContent = "Firebase Error: " + error.message;
            });
        } else {
          // Fallback developer mockup mode
          mockOTPCode = Math.floor(100000 + Math.random() * 900000).toString();
          console.log("[MOCK SMS GATEWAY] Generated OTP Code: " + mockOTPCode);
          alert("[Mock Developer Mode] OTP triggered successfully! Your test verification code is: " + mockOTPCode);
          
          statusMsg.className = "alert alert-success";
          statusMsg.textContent = "We have sent a verification OTP on your registered number " + maskedContact + ". Enter " + mockOTPCode + " to proceed.";
          document.getElementById('otp-section').style.display = "block";
        }
      } catch (err) {
        statusMsg.className = "alert alert-danger";
        statusMsg.textContent = "Server Connection error: " + err.message;
      }
    }

    function verifyOTP() {
      const code = document.getElementById('otp_code').value;
      const statusMsg = document.getElementById('status-message');

      if (!code) {
        alert("Please enter the OTP.");
        return;
      }

      if (isFirebaseConfigured) {
        confirmationResultObj.confirm(code).then(function(result) {
          // Successfully verified! Submit form to load reset password screen
          document.getElementById('verified-form').submit();
        }).catch(function(error) {
          statusMsg.className = "alert alert-danger";
          statusMsg.textContent = "Invalid OTP verification code.";
        });
      } else {
        if (code === mockOTPCode || code === "123456") {
          // Successfully verified mock! Submit form to load reset password screen
          document.getElementById('verified-form').submit();
        } else {
          statusMsg.className = "alert alert-danger";
          statusMsg.textContent = "Invalid OTP verification code.";
        }
      }
    }
  </script>
</head>
<body>
  <!-- Hidden reCAPTCHA anchor -->
  <div id="recaptcha-container"></div>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="forgot-card shadow-sm">
          <h3 class="text-center mb-2 fw-bold text-dark">Password Recovery</h3>
          <p class="text-center text-muted mb-4" style="font-size: 0.9rem;">Verify your registered mobile number using OTP to reset your password.</p>
          
          <div id="status-message" class="alert alert-info" style="display: none; border-radius: 12px; font-size: 0.9rem;"></div>

          <form id="verified-form" method="POST" action="/forgot-password/reset">
            <input type="hidden" name="contact" id="hidden-contact">
            
            <div id="details-section">
              <!-- Select Role -->
              <div class="mb-3">
                <label for="role" class="form-label">Account Role</label>
                <select class="form-select glass-select w-100" id="role" name="role" required>
                  <option value="" disabled selected>Choose Role</option>
                  <option value="receptionists">Receptionist</option>
                  <option value="doctors">Doctor</option>
                  <option value="lab_staff">Lab Staff</option>
                </select>
              </div>

              <!-- Username -->
              <div class="mb-4">
                <label for="username" class="form-label">Username</label>
                <input type="text" id="username" name="username" class="form-control glass-input" placeholder="Enter Username" required>
              </div>

              <button type="button" onclick="sendOTP()" class="btn btn-action btn-success w-100 mb-3">Send Verification OTP</button>
            </div>

            <!-- OTP Verification Block -->
            <div id="otp-section" style="display: none;" class="border-top pt-4 mt-3">
              <div class="mb-3">
                <label for="otp_code" class="form-label">Enter 6-Digit OTP</label>
                <input type="text" id="otp_code" class="form-control glass-input text-center" placeholder="------" maxlength="6" style="letter-spacing: 4px; font-size: 1.2rem; font-weight: bold;">
              </div>
              <button type="button" onclick="verifyOTP()" class="btn btn-action btn-primary w-100 mb-3">Verify OTP & Proceed</button>
            </div>
            
            <div class="text-center mt-2">
              <a href="/receptionist/login" class="back-link">← Cancel and Go Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
