<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Patient | Patil Eye Clinic</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 0;
      }
      h3 {
          font-family: 'Outfit', sans-serif;
      }
      .register-card {
          background: rgba(255, 255, 255, 0.85);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(16, 185, 129, 0.15);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
      }
      .form-label {
          font-weight: 600;
          color: #064e3b;
          font-size: 0.9rem;
          margin-bottom: 6px;
      }
      .glass-input, .glass-select {
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 12px;
          padding: 12px 16px;
          font-size: 0.95rem;
          background: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          color: #064e3b;
          font-weight: 500;
      }
      .glass-input:focus, .glass-select:focus {
          background: #ffffff;
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 12px 28px;
          font-weight: 600;
          font-size: 0.95rem;
          box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
          transition: all 0.3s ease;
      }
      .btn-action:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
      }
      .info-badge {
          background: rgba(16, 185, 129, 0.1);
          color: #047857;
          padding: 6px 12px;
          border-radius: 20px;
          font-size: 0.8rem;
          font-weight: 600;
          display: inline-block;
          margin-bottom: 15px;
          border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .back-link {
          font-size: 0.9rem;
          font-weight: 600;
          color: #10b981;
          text-decoration: none;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="register-card shadow-sm">
          <div class="text-center">
             <span class="info-badge">✦ Aadhaar verified: {{ aadhaar }}</span>
          </div>
          <h3 class="text-center mb-4 fw-bold text-dark">Register New Patient</h3>
          <form method="POST" action="/receptionist/register">
            <input type="hidden" name="aadhaar" value="{{ aadhaar }}">
            
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control glass-input" placeholder="e.g. Radhika Sharma" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Date of Birth</label>
              <input type="date" name="birth_date" class="form-control glass-input" required>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Gender</label>
              <select name="gender" class="form-select glass-select" required>
                <option value="" disabled selected>Select gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
              </select>
            </div>
            
            <div class="mb-3">
              <label class="form-label">Contact / Phone Number</label>
              <input type="text" name="phone" class="form-control glass-input" placeholder="e.g. 9876543210" required>
            </div>
            
            <div class="mb-4">
              <label class="form-label">Address</label>
              <textarea name="address" class="form-control glass-input" rows="2" placeholder="Enter patient home address..." required></textarea>
            </div>
            
            <button type="submit" class="btn btn-action btn-success w-100 mb-3">Register and Continue ➔</button>
            <div class="text-center">
              {% if session.get('receptionist_logged_in') %}
                <a href="{{ url_for('receptionist_dashboard') }}" class="back-link">← Cancel and Go Back</a>
              {% else %}
                <a href="/" class="back-link">← Cancel and Go Back</a>
              {% endif %}
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
