<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Directory & Schedule | Patil Eye Clinic</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    {% include 'theme_style.html' %}
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .maintenance-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .maintenance-icon {
            font-size: 3.5rem;
            color: #10b981;
            margin-bottom: 20px;
            display: inline-block;
            animation: wrench 2.5s ease-in-out infinite;
        }
        @keyframes wrench {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(20deg); }
        }
        .btn-home {
            background: #10b981;
            color: #ffffff;
            font-weight: 600;
            border-radius: 12px;
            padding: 12px 28px;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-home:hover {
            background: #059669;
            color: #ffffff;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="maintenance-card">
        <div class="maintenance-icon">
            <i class="bi bi-tools"></i>
        </div>
        <h3 class="fw-bold mb-3" style="color: #10b981;">Schedule Directory Under Maintenance</h3>
        <p class="text-secondary mb-4" style="font-size: 0.95rem; line-height: 1.6;">
            We are currently calibrating doctor consultation hours and calendar slots for the upcoming session. This directory will be fully active soon.
        </p>
        <div class="alert alert-info py-2 px-3 border-0 bg-opacity-10 text-info small mb-4" style="background-color: rgba(59, 130, 246, 0.1); border-radius: 10px;">
            <i class="bi bi-info-circle me-1"></i> Sorry for the inconvenience caused.
        </div>
        <div>
            <a href="/" class="btn btn-home px-4">
                <i class="bi bi-arrow-left me-2"></i> Back to Home
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
