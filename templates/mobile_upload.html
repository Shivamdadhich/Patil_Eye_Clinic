<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prescription Document Scanner | Patil Eye Clinic</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            margin: 0;
            color: #064e3b;
        }
        .capture-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.25);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 15px 35px rgba(4, 120, 87, 0.08);
            width: 100%;
            max-width: 480px;
            text-align: center;
        }
        h3 {
            font-family: 'Outfit', sans-serif;
            color: #047857;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .video-preview-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            border: 2px solid rgba(16, 185, 129, 0.2);
            margin-bottom: 16px;
            aspect-ratio: 3/4;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2);
        }
        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .shutter-btn-container {
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .shutter-btn {
            background: #10b981;
            border: 5px solid rgba(16, 185, 129, 0.2);
            width: 72px;
            height: 72px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .shutter-btn-inner {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #10b981;
            transition: all 0.2s ease;
        }
        .shutter-btn:active .shutter-btn-inner {
            transform: scale(0.85);
            background: #e6fbf4;
        }
        .thumbnails-container {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px;
            scrollbar-width: thin;
            justify-content: flex-start;
            min-height: 90px;
            border-radius: 12px;
            background: rgba(16, 185, 129, 0.04);
            margin-bottom: 18px;
            border: 1.5px dashed rgba(16, 185, 129, 0.15);
        }
        .thumb-wrapper {
            position: relative;
            flex: 0 0 70px;
            height: 70px;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #10b981;
            box-shadow: 0 2px 8px rgba(4, 120, 87, 0.1);
        }
        .thumb-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .thumb-badge {
            position: absolute;
            bottom: 2px;
            right: 2px;
            background: rgba(4, 120, 87, 0.95);
            color: #ffffff;
            font-size: 0.6rem;
            padding: 1px 4px;
            border-radius: 3px;
            font-weight: 700;
        }
        .thumb-delete {
            position: absolute;
            top: 2px;
            left: 2px;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
            border: 1px solid white;
            box-shadow: 0 1px 4px rgba(0,0,0,0.2);
        }
        .btn-action {
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
            border: none;
            background: #10b981;
            color: #ffffff;
        }
        .btn-action:hover {
            background: #059669;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="capture-card">
        <h3 class="mb-2">Prescription Document Scanner</h3>
        <p class="text-muted small mb-3">Position the prescription document in the view and click the shutter button. Snapped pages will sync directly to the doctor portal.</p>
        
        <div class="video-preview-wrapper">
            <video id="webcam" autoplay playsinline></video>
        </div>
        
        <div class="shutter-btn-container">
            <div class="shutter-btn" onclick="captureFrame()">
                <div class="shutter-btn-inner"></div>
            </div>
        </div>
        
        <div class="text-start mb-2 small text-success fw-bold">Captured Pages Order:</div>
        <div class="thumbnails-container" id="thumbContainer">
            <div class="w-100 text-center text-muted small my-auto py-2" id="emptyPlaceholder">No pages captured yet.</div>
        </div>

        <button type="button" id="uploadBtn" class="btn btn-action w-100" style="display: none;" onclick="uploadAll()">
            Upload & Sync Pages
        </button>
        
        <canvas id="captureCanvas" style="display: none;"></canvas>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('captureCanvas');
        const thumbContainer = document.getElementById('thumbContainer');
        const emptyPlaceholder = document.getElementById('emptyPlaceholder');
        const uploadBtn = document.getElementById('uploadBtn');
        
        let capturedBlobs = [];

        // Initialize camera
        navigator.mediaDevices.getUserMedia({
            video: { facingMode: { exact: "environment" } },
            audio: false
        })
        .catch(err => {
            return navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" }, audio: false });
        })
        .catch(err => {
            return navigator.mediaDevices.getUserMedia({ video: true, audio: false });
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera access error:", err);
            alert("Unable to open camera. Please grant permission in browser settings.");
        });

        function captureFrame() {
            if (!video.srcObject) return;
            
            let targetWidth = video.videoWidth;
            let targetHeight = video.videoHeight;
            const maxDim = 1000;
            
            // Downscale image if it exceeds max dimension
            if (targetWidth > maxDim || targetHeight > maxDim) {
                if (targetWidth > targetHeight) {
                    targetHeight = Math.round((targetHeight * maxDim) / targetWidth);
                    targetWidth = maxDim;
                } else {
                    targetWidth = Math.round((targetWidth * maxDim) / targetHeight);
                    targetHeight = maxDim;
                }
            }
            
            canvas.width = targetWidth;
            canvas.height = targetHeight;
            
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Convert to highly compressed JPEG blob
            canvas.toBlob((blob) => {
                capturedBlobs.push(blob);
                renderThumbnails();
            }, 'image/jpeg', 0.50);
        }

        function removeImage(index) {
            capturedBlobs.splice(index, 1);
            renderThumbnails();
        }

        function renderThumbnails() {
            thumbContainer.innerHTML = '';
            
            if (capturedBlobs.length === 0) {
                thumbContainer.appendChild(emptyPlaceholder);
                uploadBtn.style.display = 'none';
                return;
            }
            
            capturedBlobs.forEach((blob, idx) => {
                const url = URL.createObjectURL(blob);
                const wrapper = document.createElement('div');
                wrapper.className = 'thumb-wrapper';
                
                const img = document.createElement('img');
                img.src = url;
                
                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'thumb-delete';
                deleteBtn.innerHTML = '✕';
                deleteBtn.onclick = () => removeImage(idx);
                
                const badge = document.createElement('span');
                badge.className = 'thumb-badge';
                badge.innerHTML = `Page ${idx + 1}`;
                
                wrapper.appendChild(img);
                wrapper.appendChild(deleteBtn);
                wrapper.appendChild(badge);
                thumbContainer.appendChild(wrapper);
            });
            
            uploadBtn.style.display = 'block';
            uploadBtn.innerHTML = `Upload & Sync ${capturedBlobs.length} Page${capturedBlobs.length > 1 ? 's' : ''}`;
        }

        function uploadAll() {
            if (capturedBlobs.length === 0) return;
            
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = `
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                Syncing pages...
            `;
            
            const formData = new FormData();
            capturedBlobs.forEach((blob, idx) => {
                formData.append('prescription_file', blob, `prescription_page_${idx + 1}.jpg`);
            });
            
            fetch("/api/prescription/upload_mobile/{{ token }}", {
                method: "POST",
                body: formData
            })
            .then(res => res.text())
            .then(html => {
                document.body.innerHTML = html;
            })
            .catch(err => {
                console.error("Upload error:", err);
                alert("Upload failed. Please try again.");
                renderThumbnails();
            });
        }
    </script>
</body>
</html>
