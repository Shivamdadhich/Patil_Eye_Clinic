<!-- templates/make_appointment.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Make Appointment | Patil Eye Clinic</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 40px 0;
      }
      h3 {
          font-family: 'Outfit', sans-serif;
      }
      .appointment-card {
          background: rgba(255, 255, 255, 0.85);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(16, 185, 129, 0.15);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
      }
      .form-label {
          font-weight: 600;
          color: #064e3b;
          font-size: 0.9rem;
          margin-bottom: 6px;
      }
      .glass-input, .glass-select {
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 12px;
          padding: 12px 16px;
          font-size: 0.95rem;
          background: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          color: #064e3b;
          font-weight: 500;
      }
      .glass-input:focus, .glass-select:focus {
          background: #ffffff;
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 12px 28px;
          font-weight: 600;
          font-size: 0.95rem;
          box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
          transition: all 0.3s ease;
      }
      .btn-action:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
      }
      .info-badge {
          background: rgba(16, 185, 129, 0.1);
          color: #047857;
          padding: 6px 12px;
          border-radius: 20px;
          font-size: 0.8rem;
          font-weight: 600;
          display: inline-block;
          margin-bottom: 15px;
          border: 1px solid rgba(16, 185, 129, 0.2);
      }
      .back-link {
          font-size: 0.9rem;
          font-weight: 600;
          color: #10b981;
          text-decoration: none;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="appointment-card shadow-sm">
          <div class="text-center mb-3">
             <span class="info-badge">✦ Patient Found</span>
             <div>
               <a href="/receptionist/pharmacy-billing?aadhaar={{ aadhaar }}" class="btn btn-outline-success btn-sm px-3 rounded-pill fw-semibold" style="font-size: 0.8rem; text-decoration: none; border-color: #10b981; color: #047857;">➔ Record Pharmacy Bill</a>
             </div>
          </div>
          <h3 class="text-center mb-4 fw-bold text-dark">Book Appointment</h3>
          <form method="POST" action="/receptionist/appointment">
            <input type="hidden" name="aadhaar" value="{{ aadhaar }}">
            <input type="hidden" name="department" value="Ophthalmology">

            <!-- Locked Department -->
            <div class="mb-3">
              <label class="form-label">Department</label>
              <select class="form-select glass-select" disabled style="background-color: #e5e7eb !important; color: #4b5563 !important; cursor: not-allowed;">
                <option selected>Ophthalmology</option>
              </select>
            </div>

            <!-- Doctor Dropdown Selection -->
            <div class="mb-3">
              <label class="form-label">Select Doctor</label>
              <select class="form-select glass-select" name="doctor" id="doctor" required>
                <option disabled selected value="">Select a doctor</option>
                <option value="Dr. Prajakta Chachre">Dr. Prajakta Chachre</option>
                <option value="Dr. XYZ">Dr. XYZ</option>
              </select>
            </div>

            <!-- Date Selection -->
            <div class="mb-3">
              <label class="form-label">Preferred Date</label>
              <input type="date" name="date" class="form-control glass-input" required min="{{ min_date }}">
            </div>

            <!-- Fee & Payment Mode -->
            <div class="row g-2 mb-4">
              <div class="col-6">
                <label class="form-label">Consultation Fee (₹)</label>
                <input type="number" name="amount" class="form-control glass-input" value="400" min="0" step="50" required>
              </div>
              <div class="col-6">
                <label class="form-label">Payment Mode</label>
                <select class="form-select glass-select" name="payment_method" required>
                  <option value="Cash">Cash</option>
                  <option value="UPI" selected>UPI</option>
                  <option value="Card">Card</option>
                </select>
              </div>
            </div>

            <button type="submit" class="btn btn-action btn-success w-100 mb-3">Confirm Appointment Booking ➔</button>
            <div class="text-center">
              {% if session.get('receptionist_logged_in') %}
                <a href="{{ url_for('receptionist_dashboard') }}" class="back-link">← Cancel and Go Back</a>
              {% else %}
                <a href="/" class="back-link">← Cancel and Go Back</a>
              {% endif %}
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
