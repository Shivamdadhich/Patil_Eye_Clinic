<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Patient | Patil Eye Clinic</title>
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 50%, #f6fffa 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
      }
      h3 {
          font-family: 'Outfit', sans-serif;
      }
      .search-card {
          background: rgba(255, 255, 255, 0.85);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(16, 185, 129, 0.15);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 10px 30px -10px rgba(4, 120, 87, 0.08);
      }
      .form-label {
          font-weight: 600;
          color: #064e3b;
          font-size: 0.95rem;
          margin-bottom: 8px;
      }
      .glass-input {
          border: 1.5px solid rgba(16, 185, 129, 0.2);
          border-radius: 12px;
          padding: 14px 18px;
          font-size: 1rem;
          background: rgba(255, 255, 255, 0.8);
          transition: all 0.3s ease;
          color: #064e3b;
          font-weight: 600;
      }
      .glass-input:focus {
          background: #ffffff;
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 14px 28px;
          font-weight: 600;
          font-size: 1rem;
          box-shadow: 0 4px 14px rgba(16, 185, 129, 0.2);
          transition: all 0.3s ease;
      }
      .btn-action:hover {
          transform: translateY(-1px);
          box-shadow: 0 6px 20px rgba(16, 185, 129, 0.3);
      }
      .back-link {
          font-size: 0.9rem;
          font-weight: 600;
          color: #10b981;
          text-decoration: none;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="search-card shadow-sm">
          <h3 class="text-center mb-4 fw-bold text-dark">
            {% if session.get('receptionist_logged_in') %}
              Search Patient by Aadhaar
            {% else %}
              Book Online Appointment
            {% endif %}
          </h3>
          <form method="POST" action="/receptionist/search">
            <div class="mb-4">
              <label for="aadhaar" class="form-label">Aadhaar Card Number (12 Digits)</label>
              <input type="text" name="aadhaar" class="form-control glass-input" required placeholder="Enter Aadhaar Number" maxlength="12" pattern="\d{12}">
            </div>
            <button type="submit" class="btn btn-action btn-primary w-100 mb-3">Verify & Proceed ➔</button>
            <div class="text-center">
              {% if session.get('receptionist_logged_in') %}
                <a href="{{ url_for('receptionist_dashboard') }}" class="back-link">← Go Back to Dashboard</a>
              {% else %}
                <a href="/" class="back-link">← Back to Home</a>
              {% endif %}
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
