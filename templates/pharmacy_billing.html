<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pharmacy Billing | Patil Eye Clinic</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;800;900&family=Outfit:wght@300;400;600;700;800&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  {% include 'theme_style.html' %}
  <style>
      body {
          font-family: 'Plus Jakarta Sans', sans-serif;
          background: linear-gradient(135deg, #f0fdf4 0%, #ecfdf5 100%) !important;
          min-height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 20px;
      }
      .billing-card {
          background: rgba(255, 255, 255, 0.85);
          backdrop-filter: blur(20px);
          border: 1px solid rgba(16, 185, 129, 0.18);
          border-radius: 24px;
          padding: 40px;
          box-shadow: 0 20px 40px rgba(4, 120, 87, 0.08);
      }
      .glass-input, .glass-select {
          background: rgba(255, 255, 255, 0.9) !important;
          border: 1.5px solid rgba(16, 185, 129, 0.15) !important;
          border-radius: 12px !important;
          padding: 12px 16px !important;
          font-size: 0.95rem !important;
          transition: all 0.3s ease !important;
      }
      .glass-input:focus, .glass-select:focus {
          border-color: #10b981 !important;
          box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.15) !important;
      }
      .btn-action {
          border-radius: 12px;
          padding: 12px 24px;
          font-weight: 600;
          letter-spacing: 0.5px;
          transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .btn-success {
          background: linear-gradient(135deg, #10b981 0%, #059669 100%) !important;
          border: none !important;
      }
      .btn-success:hover {
          transform: translateY(-2px);
          box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
      }
      .info-badge {
          background: rgba(16, 185, 129, 0.1);
          color: #047857;
          font-size: 0.82rem;
          font-weight: 700;
          padding: 6px 16px;
          border-radius: 30px;
          letter-spacing: 1px;
          text-transform: uppercase;
          display: inline-block;
          margin-bottom: 20px;
      }
      .back-link {
          color: #10b981;
          text-decoration: none;
          font-weight: 600;
          font-size: 0.9rem;
          transition: color 0.2s ease;
      }
      .back-link:hover {
          color: #059669;
      }
  </style>
  <script>
    async function lookupPatientName() {
      const aadhaar = document.getElementById('aadhaar').value;
      const nameField = document.getElementById('patient_name_display');
      const submitBtn = document.getElementById('submit_btn');
      
      if (aadhaar.length < 12) {
        nameField.value = "Enter complete 12-digit Aadhaar";
        nameField.style.color = "#ef4444";
        submitBtn.disabled = true;
        return;
      }

      try {
        const response = await fetch(`/api/get-patient-name?aadhaar=${encodeURIComponent(aadhaar)}`);
        const data = await response.json();
        if (data.status === "success") {
          nameField.value = data.name;
          nameField.style.color = "#047857";
          submitBtn.disabled = false;
        } else {
          nameField.value = "Patient not registered in database!";
          nameField.style.color = "#ef4444";
          submitBtn.disabled = true;
        }
      } catch (error) {
        console.error("Error looking up patient:", error);
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const aadhaarInput = document.getElementById('aadhaar');
      aadhaarInput.addEventListener('input', lookupPatientName);
      if (aadhaarInput.value.length === 12) {
        lookupPatientName();
      }
    });
  </script>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-5">
        <div class="billing-card shadow-sm">
          <div class="text-center">
             <span class="info-badge">✦ Pharmacy Billing</span>
          </div>
          <h3 class="text-center mb-4 fw-bold text-dark">Record Medicine Sale</h3>

          {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
              {% for category, message in messages %}
                <div class="alert alert-{{ category }} text-center py-2" role="alert" style="border-radius: 12px; font-size: 0.9rem;">
                  {{ message }}
                </div>
              {% endfor %}
            {% endif %}
          {% endwith %}

          <form method="POST" action="/receptionist/pharmacy-billing">
            <!-- Aadhaar Input -->
            <div class="mb-3">
               <label for="aadhaar" class="form-label">Patient UID (Firstname + DDMMYYYY)</label>
               <input type="text" name="aadhaar" id="aadhaar" class="form-control glass-input" placeholder="e.g. SHIVAM01012004" minlength="9" maxlength="28" required value="{{ aadhaar or '' }}" style="text-transform: uppercase;" oninput="this.value = this.value.toUpperCase()">
             </div>
 
             <!-- Patient Name Auto-display -->
             <div class="mb-3">
               <label class="form-label">Patient Registered Name</label>
               <input type="text" id="patient_name_display" class="form-control glass-input" readonly style="background-color: #f3f4f6 !important; font-weight: 600;" value="Waiting for UID...">
            </div>

            <!-- Total Amount -->
            <div class="mb-3">
              <label for="amount" class="form-label">Total Billing Amount (₹)</label>
              <input type="number" name="amount" id="amount" class="form-control glass-input" min="1" step="1" required placeholder="Enter total medicine price">
            </div>

            <!-- Payment Method -->
            <div class="mb-4">
              <label for="payment_method" class="form-label">Payment Method</label>
              <select name="payment_method" id="payment_method" class="form-select glass-select" required>
                <option value="UPI" selected>UPI</option>
                <option value="Cash">Cash</option>
                <option value="Card">Card</option>
              </select>
            </div>

            <button type="submit" id="submit_btn" class="btn btn-action btn-success w-100 mb-3" disabled>Record Pharmacy Sale ➔</button>
            <div class="text-center">
              <a href="{{ url_for('receptionist_dashboard') }}" class="back-link">← Cancel and Go Back</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
